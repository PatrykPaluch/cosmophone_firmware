; PlatformIO Project Configuration File
; Board: ESP32-4848S040 (JCZN) — ESP32-S3, 480x480 ST7701 RGB, GT911 touch
;
; Generate compile_commands.json for IDE/clangd (per-machine, use after clone):
;   pio run -t compiledb

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.psram = enabled
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -Isrc/system/include
    -Isrc/apps/include

lib_deps =
    Arduino_GFX
